services:
  - type: web
    name: mylafyi
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: ADMIN_PASSWORD
        sync: false
      - key: VIEWER_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /data
      - key: UPLOADS_DIR
        value: /data/uploads
      - key: NODE_ENV
        value: production
    disk:
      name: myla-data
      mountPath: /data
      sizeGB: 1
